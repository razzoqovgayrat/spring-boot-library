spring.application.name=library

# ===============================
# PostgreSQL DataSource Configuration
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# Scheduler Configuration
# ===============================
library.loan.duration-days=14
library.loan.max-active-loans=5

library.fine.per-day-amount=1000
library.fine.limit-amount=50000

library.reservation.ready-window-hours=48

scheduler.overdue-scan-cron=0 0 6 * * *
scheduler.reservation-expiry-cron=0 0 7 * * *

# ===============================
# FlyWay Configuration
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

# ===============================
# jwt Configuration
# ===============================
app.jwt.secretKey=${JWT_SECRET_KEY}
app.jwt.tokenLiveTime=${JWT_TOKEN_LIVE_TIME}
app.refreshTokenLiveTime=${JWT_REFRESH_TOKEN_LIVE_TIME}