spring.application.name=library

# ===============================
# PostgreSQL DataSource Configuration
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=0306

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# Scheduler Configuration
# ===============================
library.loan.duration-days=14
library.loan.max-active-loans=5

library.fine.per-day-amount=1000
library.fine.limit-amount=50000

library.reservation.ready-window-hours=48

scheduler.overdue-scan-cron=0 0 6 * * *
scheduler.reservation-expiry-cron=0 0 7 * * *

# ===============================
# FlyWay Configuration
